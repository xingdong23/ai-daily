<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报 — 搞钱 · AI视频 · 工具 · 收藏</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1a1a1a;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --text2: #999;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --pink: #ec4899;
            --cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        header {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text2); font-size: 14px; margin-top: 4px; }
        
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text2);
            border: none;
            background: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); background: var(--surface); }
        .tab.active { color: var(--text); background: var(--surface2); border: 1px solid var(--border); }
        
        .section { display: none; }
        .section.active { display: block; }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .date-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .date-btn {
            padding: 6px 14px;
            border-radius: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .date-btn:hover { color: var(--text); border-color: var(--accent); }
        .date-btn.active { color: var(--text); background: var(--accent); border-color: var(--accent); }
        
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px; }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-date { font-size: 12px; color: var(--text2); white-space: nowrap; }
        .card-body { font-size: 14px; color: var(--text2); }
        .card-body p { margin-top: 6px; }
        .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        .tag-money { background: rgba(34,197,94,0.15); color: var(--green); }
        .tag-video { background: rgba(239,68,68,0.15); color: var(--red); }
        .tag-ai-tool { background: rgba(99,102,241,0.15); color: var(--accent); }
        .tag-dev { background: rgba(59,130,246,0.15); color: var(--blue); }
        .tag-star { background: rgba(245,158,11,0.15); color: var(--orange); }
        .tag-stock { background: rgba(6,182,212,0.15); color: var(--cyan); }
        .tag-agent { background: rgba(236,72,153,0.15); color: var(--pink); }
        
        .card-source { font-size: 12px; color: var(--text2); margin-top: 8px; }
        .card-source a { color: var(--accent); text-decoration: none; }

        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .tool-grid { grid-template-columns: 1fr; } }
        .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .tool-card h3 { font-size: 15px; margin-bottom: 8px; }
        .tool-card .desc { font-size: 13px; color: var(--text2); }
        .tool-card .pros { color: var(--green); font-size: 13px; margin-top: 8px; }
        .tool-card .cons { color: var(--red); font-size: 13px; margin-top: 4px; }
        
        .count-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 12px;
            color: var(--text2);
            margin-left: 6px;
        }
        
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            margin-top: 48px;
            text-align: center;
            color: var(--text2);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ AI 日报</h1>
            <p>搞钱 · AI视频 · 工具 · 收藏 · 每日自动更新</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" data-section="money">💰 搞钱</button>
            <button class="tab" data-section="video">🎬 AI 视频</button>
            <button class="tab" data-section="ai-tool">🤖 AI 工具</button>
            <button class="tab" data-section="dev">💻 开发工具</button>
            <button class="tab" data-section="star">⭐ 收藏</button>
            <button class="tab" data-section="stock">📈 股票</button>
        </div>
        
        <div id="money" class="section active">
            <div class="section-title">💰 搞钱机会 <span class="count-badge" id="money-count"></span></div>
            <div id="money-content"></div>
        </div>
        
        <div id="video" class="section">
            <div class="section-title">🎬 AI 视频 <span class="count-badge" id="video-count"></span></div>
            <div class="date-nav" id="video-date-nav"></div>
            <div id="video-content"></div>
            <h3 style="color:var(--text2);margin:24px 0 12px;">🛠️ 视频工具对比</h3>
            <div id="video-tools"></div>
        </div>
        
        <div id="ai-tool" class="section">
            <div class="section-title">🤖 AI 工具 <span class="count-badge" id="ai-tool-count"></span></div>
            <div id="ai-tool-content"></div>
        </div>
        
        <div id="dev" class="section">
            <div class="section-title">💻 开发工具 <span class="count-badge" id="dev-count"></span></div>
            <div id="dev-content"></div>
        </div>
        
        <div id="star" class="section">
            <div class="section-title">⭐ 收藏夹 <span class="count-badge" id="star-count"></span></div>
            <div id="star-content"></div>
        </div>
        
        <div id="stock" class="section">
            <div class="section-title">📈 股票</div>
            <div id="stock-content"></div>
        </div>
        
        <footer>
            由 AI 自动生成 · 每日更新 · <span id="last-update"></span>
        </footer>
    </div>
    
    <script>
        let allData = {};
        
        async function loadData() {
            try {
                const resp = await fetch('data/content.json');
                allData = await resp.json();
                renderAll();
            } catch(e) {
                document.querySelectorAll('.section').forEach(s => {
                    const c = s.querySelector('[id$="-content"]');
                    if (c) c.innerHTML = '<div class="card"><div class="card-body">加载失败，请刷新页面</div></div>';
                });
            }
        }
        
        function renderAll() {
            renderMoney();
            renderVideo();
            renderAiTool();
            renderDev();
            renderStar();
            renderStock();
            document.getElementById('last-update').textContent = '更新于 ' + (allData.lastUpdate || '未知');
        }
        
        function cardHTML(item) {
            return `<div class="card">
                <div class="card-header">
                    <div class="card-title">${item.title}</div>
                    <div class="card-date">${item.date || ''}</div>
                </div>
                <div class="card-body">${item.body}</div>
                ${item.tags ? `<div class="card-tags">${item.tags.map(t => `<span class="tag tag-${t}">${tagLabel(t)}</span>`).join('')}</div>` : ''}
                ${item.source ? `<div class="card-source">🔗 <a href="${item.source}" target="_blank">${item.sourceLabel || '查看原文'}</a></div>` : ''}
            </div>`;
        }
        
        function tagLabel(t) {
            const map = {money:'搞钱', video:'AI视频', 'ai-tool':'AI工具', dev:'开发', star:'收藏', stock:'股票', agent:'Agent'};
            return map[t] || t;
        }
        
        function renderItems(containerId, items, countId) {
            const el = document.getElementById(containerId);
            if (countId) document.getElementById(countId).textContent = items.length + ' 条';
            if (items.length === 0) { el.innerHTML = '<div class="card"><div class="card-body">暂无内容</div></div>'; return; }
            el.innerHTML = items.map(cardHTML).join('');
        }
        
        function renderMoney() {
            renderItems('money-content', allData.money || [], 'money-count');
        }
        
        function renderVideo() {
            const items = allData.video || [];
            document.getElementById('video-count').textContent = items.length + ' 条';
            
            // Group by date
            const byDate = {};
            items.forEach(item => {
                const d = item.date || '未知日期';
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(item);
            });
            const dates = Object.keys(byDate).sort().reverse();
            
            const nav = document.getElementById('video-date-nav');
            if (dates.length > 1) {
                nav.innerHTML = dates.map((d, i) => `<button class="date-btn ${i===0?'active':''}" data-date="${d}">${d}</button>`).join('');
                nav.style.display = 'flex';
                nav.onclick = (e) => {
                    if (e.target.classList.contains('date-btn')) {
                        nav.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        renderVideoDate(e.target.dataset.date);
                    }
                };
                renderVideoDate(dates[0]);
            } else {
                nav.style.display = 'none';
                document.getElementById('video-content').innerHTML = items.map(cardHTML).join('');
            }
            
            // Video tools
            const tools = allData.videoTools || [];
            if (tools.length > 0) {
                document.getElementById('video-tools').innerHTML = '<div class="tool-grid">' + tools.map(t => `
                    <div class="tool-card">
                        <h3>${t.name}</h3>
                        <div class="desc">${t.desc}</div>
                        <div class="pros">✅ ${t.pros}</div>
                        <div class="cons">⚠️ ${t.cons}</div>
                    </div>
                `).join('') + '</div>';
            }
        }
        
        function renderVideoDate(date) {
            const items = (allData.video || []).filter(i => (i.date || '未知日期') === date);
            document.getElementById('video-content').innerHTML = items.map(cardHTML).join('');
        }
        
        function renderAiTool() {
            renderItems('ai-tool-content', allData.aiTool || [], 'ai-tool-count');
        }
        
        function renderDev() {
            renderItems('dev-content', allData.dev || [], 'dev-count');
        }
        
        function renderStar() {
            renderItems('star-content', allData.star || [], 'star-count');
        }
        
        function renderStock() {
            renderItems('stock-content', allData.stock || [], 'stock-count');
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.section).classList.add('active');
            });
        });
        
        loadData();
    </script>
</body>
</html>
