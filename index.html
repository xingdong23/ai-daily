<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报 v2 — 数字人 · AI资讯 · 收藏</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1a1a1a;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --text2: #999;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --pink: #ec4899;
            --cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        header {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text2); font-size: 14px; margin-top: 4px; }
        
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text2);
            border: none;
            background: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); background: var(--surface); }
        .tab.active { color: var(--text); background: var(--surface2); border: 1px solid var(--border); }
        
        .section { display: none; }
        .section.active { display: block; }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .date-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .date-btn {
            padding: 6px 14px;
            border-radius: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .date-btn:hover { color: var(--text); border-color: var(--accent); }
        .date-btn.active { color: var(--text); background: var(--accent); border-color: var(--accent); }
        
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px; }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-date { font-size: 12px; color: var(--text2); white-space: nowrap; }
        .card-body { font-size: 14px; color: var(--text2); }
        .card-body p { margin-top: 6px; }
        .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        .tag-money { background: rgba(34,197,94,0.15); color: var(--green); }
        .tag-video { background: rgba(239,68,68,0.15); color: var(--red); }
        .tag-ai-tool { background: rgba(99,102,241,0.15); color: var(--accent); }
        .tag-dev { background: rgba(59,130,246,0.15); color: var(--blue); }
        .tag-star { background: rgba(245,158,11,0.15); color: var(--orange); }
        .tag-stock { background: rgba(6,182,212,0.15); color: var(--cyan); }
        .tag-agent { background: rgba(236,72,153,0.15); color: var(--pink); }

        /* Stock Monitor Styles */
        .stock-summary {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px; text-align: center;
        }
        .stat-card .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
        .stat-card .value { font-size: 20px; font-weight: 700; }
        .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .stock-group-title {
            font-size: 15px; font-weight: 600; margin: 20px 0 10px;
            padding-left: 8px; border-left: 3px solid var(--accent);
        }
        .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .stock-table th {
            text-align: left; padding: 8px 10px; color: var(--text2);
            border-bottom: 1px solid var(--border); font-weight: 500;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .stock-table td {
            padding: 10px; border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .stock-table tr:hover { background: var(--surface); }
        .stock-table .sym { font-weight: 700; font-size: 14px; }
        .stock-table .price { font-weight: 600; font-variant-numeric: tabular-nums; }
        .up { color: var(--green); }
        .down { color: var(--red); }
        .flat { color: var(--text2); }
        .tier-badge {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            font-size: 11px; font-weight: 600;
        }
        .tier-1 { background: rgba(34,197,94,0.15); color: var(--green); }
        .tier-2 { background: rgba(245,158,11,0.15); color: var(--orange); }
        .tier-3 { background: rgba(156,163,175,0.15); color: var(--text2); }
        .rec-badge { font-size: 11px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
        .rec-buy { background: rgba(34,197,94,0.15); color: var(--green); }
        .rec-hold { background: rgba(245,158,11,0.15); color: var(--orange); }
        .rec-sell { background: rgba(239,68,68,0.15); color: var(--red); }
        .holding-row { background: rgba(99,102,241,0.05); }
        .holding-row:hover { background: rgba(99,102,241,0.1); }
        .pnl-tag { font-size: 12px; font-weight: 600; }
        .stock-notes { font-size: 11px; color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .refresh-btn {
            float: right; padding: 6px 14px; border-radius: 6px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text2); cursor: pointer; font-size: 12px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { color: var(--text); border-color: var(--accent); }
        @media (max-width: 700px) {
            .stock-table { font-size: 11px; }
            .stock-table th, .stock-table td { padding: 6px 5px; }
            .stock-notes { max-width: 100px; }
        }
        
        .card-source { font-size: 12px; color: var(--text2); margin-top: 8px; }
        .card-source a { color: var(--accent); text-decoration: none; }

        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .tool-grid { grid-template-columns: 1fr; } }
        .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .tool-card h3 { font-size: 15px; margin-bottom: 8px; }
        .tool-card .desc { font-size: 13px; color: var(--text2); }
        .tool-card .pros { color: var(--green); font-size: 13px; margin-top: 8px; }
        .tool-card .cons { color: var(--red); font-size: 13px; margin-top: 4px; }
        
        .count-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 12px;
            color: var(--text2);
            margin-left: 6px;
        }
        
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            margin-top: 48px;
            text-align: center;
            color: var(--text2);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ AI 日报</h1>
            <p>数字人 · AI资讯 · 收藏 · 每日自动更新</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" data-section="video">🎬 数字人</button>
            <button class="tab" data-section="ai-tool">🤖 AI 资讯</button>
            <button class="tab" data-section="star">⭐ 收藏</button>
            <button class="tab" data-section="sites">🔗 站点</button>
            <button class="tab" data-section="todo">📋 TODO</button>
            <button class="tab" data-section="stock">📈 股票</button>
        </div>
        
        <div id="video" class="section active">
            <div class="section-title">🎬 数字人 <span class="count-badge" id="video-count"></span></div>
            <div class="date-nav" id="video-date-nav"></div>
            <div id="video-content"></div>
            <h3 style="color:var(--text2);margin:24px 0 12px;">🛠️ 视频工具对比</h3>
            <div id="video-tools"></div>
        </div>
        
        <div id="ai-tool" class="section">
            <div class="section-title">🤖 AI 资讯 <span class="count-badge" id="ai-tool-count"></span></div>
            <div id="ai-tool-content"></div>
        </div>
        
        <div id="star" class="section">
            <div class="section-title">⭐ 收藏夹 <span class="count-badge" id="star-count"></span></div>
            <div id="star-content"></div>
        </div>
        
        <div id="todo" class="section">
            <div class="section-title">📋 TODO <span class="count-badge" id="todo-count"></span></div>
            <div id="todo-content"></div>
        </div>

        <div id="sites" class="section">
            <div class="section-title">🔗 优质站点 <span class="count-badge" id="sites-count"></span></div>
            <div id="sites-content"></div>
        </div>
        
        <div id="stock" class="section">
            <div class="section-title">📈 股票 <span class="count-badge" id="stock-count"></span></div>
            <div id="stock-content"></div>
        </div>
        
        <footer>
            由 AI 自动生成 · 每日更新 · <span id="last-update"></span>
        </footer>
    </div>
    
    <script>
        let allData = {};
        
        async function loadData() {
            try {
                const resp = await fetch('data/content.json?v=2&t=' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const text = await resp.text();
                allData = JSON.parse(text);
                console.log('Loaded', Object.keys(allData));
                renderAll();
            } catch(e) {
                console.error('Load failed:', e);
                document.querySelectorAll('.section').forEach(s => {
                    const c = s.querySelector('[id$="-content"]');
                    if (c) c.innerHTML = '<div class="card"><div class="card-body">加载失败: ' + e.message + '</div></div>';
                });
            }
        }
        
        function renderAll() {
            renderVideo();
            renderAiTool();
            renderSites();
            renderStar();
            renderStock();
            renderTodo();
            document.getElementById('last-update').textContent = '更新于 ' + (allData.lastUpdate || '未知');
        }
        
        function cardHTML(item) {
            return `<div class="card">
                <div class="card-header">
                    <div class="card-title">${item.title}</div>
                    <div class="card-date">${item.date || ''}</div>
                </div>
                <div class="card-body">${item.body}</div>
                ${item.tags ? `<div class="card-tags">${item.tags.map(t => `<span class="tag tag-${t}">${tagLabel(t)}</span>`).join('')}</div>` : ''}
                ${item.source ? `<div class="card-source">🔗 <a href="${item.source}" target="_blank">${item.sourceLabel || '查看原文'}</a></div>` : ''}
            </div>`;
        }
        
        function tagLabel(t) {
            const map = {video:'数字人', 'ai-tool':'AI工具', dev:'开发', star:'收藏', stock:'股票', agent:'Agent'};
            return map[t] || t;
        }
        
        function renderItems(containerId, items, countId) {
            const el = document.getElementById(containerId);
            if (countId) document.getElementById(countId).textContent = items.length + ' 条';
            if (items.length === 0) { el.innerHTML = '<div class="card"><div class="card-body">暂无内容</div></div>'; return; }
            el.innerHTML = items.map(cardHTML).join('');
        }
        
        function renderVideo() {
            const items = allData.video || [];
            document.getElementById('video-count').textContent = items.length + ' 条';
            
            // Group by date
            const byDate = {};
            items.forEach(item => {
                const d = item.date || '未知日期';
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(item);
            });
            const dates = Object.keys(byDate).sort().reverse();
            
            const nav = document.getElementById('video-date-nav');
            if (dates.length > 1) {
                nav.innerHTML = dates.map((d, i) => `<button class="date-btn ${i===0?'active':''}" data-date="${d}">${d}</button>`).join('');
                nav.style.display = 'flex';
                nav.onclick = (e) => {
                    if (e.target.classList.contains('date-btn')) {
                        nav.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        renderVideoDate(e.target.dataset.date);
                    }
                };
                renderVideoDate(dates[0]);
            } else {
                nav.style.display = 'none';
                document.getElementById('video-content').innerHTML = items.map(cardHTML).join('');
            }
            
            // Video tools
            const tools = allData.videoTools || [];
            if (tools.length > 0) {
                document.getElementById('video-tools').innerHTML = '<div class="tool-grid">' + tools.map(t => `
                    <div class="tool-card">
                        <h3>${t.name}</h3>
                        <div class="desc">${t.desc}</div>
                        <div class="pros">✅ ${t.pros}</div>
                        <div class="cons">⚠️ ${t.cons}</div>
                    </div>
                `).join('') + '</div>';
            }
        }
        
        function renderVideoDate(date) {
            const items = (allData.video || []).filter(i => (i.date || '未知日期') === date);
            document.getElementById('video-content').innerHTML = items.map(cardHTML).join('');
        }
        
        function renderAiTool() {
            const items = [...(allData.aiTool || []), ...(allData.dev || [])].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            renderItems('ai-tool-content', items, 'ai-tool-count');
        }
        
        function renderSites() {
            const items = allData.sites || [];
            document.getElementById('sites-count').textContent = items.length + ' 个';
            if (items.length === 0) { document.getElementById('sites-content').innerHTML = '<div class="card"><div class="card-body">暂无收藏站点</div></div>'; return; }
            document.getElementById('sites-content').innerHTML = '<div class="tool-grid">' + items.map(s => `
                <div class="tool-card">
                    <h3><a href="${s.url}" target="_blank" style="color:var(--text);text-decoration:none;">${s.name}</a></h3>
                    <div class="desc">${s.desc}</div>
                    ${s.tags ? '<div style="margin-top:8px;">' + s.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join(' ') + '</div>' : ''}
                </div>
            `).join('') + '</div>';
        }
        
        function renderStar() {
            renderItems('star-content', allData.star || [], 'star-count');
        }
        
        async function renderStock() {
            const container = document.getElementById('stock-content');
            try {
                const resp = await fetch('data/stocks.json?v=1&t=' + Date.now());
                const data = await resp.json();
                const stocks = data.stocks || [];
                document.getElementById('stock-count').textContent = stocks.length + ' 只';

                // Summary cards
                const holdings = stocks.filter(s => s.group === '持仓');
                const totalPnl = holdings.reduce((sum, s) => sum + (s.pnl || 0), 0);
                const upCount = stocks.filter(s => s.change > 0).length;
                const downCount = stocks.filter(s => s.change < 0).length;

                let html = `<div class="stock-summary">
                    <div class="stat-card">
                        <div class="label">监控总数</div>
                        <div class="value">${stocks.length}</div>
                        <div class="sub">持仓 ${holdings.length} / 候选 ${stocks.length - holdings.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">持仓盈亏</div>
                        <div class="value ${totalPnl >= 0 ? 'up' : 'down'}">$${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(0)}</div>
                        <div class="sub">${holdings.length} 只持仓</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">今日涨跌</div>
                        <div class="value"><span class="up">↑${upCount}</span> <span class="down">↓${downCount}</span></div>
                        <div class="sub">${data.lastUpdate ? data.lastUpdate.split(' ')[0] : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">CRDO</div>
                        <div class="value ${stocks.find(s=>s.sym==='CRDO')?.change >= 0 ? 'up' : 'down'}">$${stocks.find(s=>s.sym==='CRDO')?.price || '-'}</div>
                        <div class="sub">目标 $199</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">RDDT</div>
                        <div class="value ${stocks.find(s=>s.sym==='RDDT')?.change >= 0 ? 'up' : 'down'}">$${stocks.find(s=>s.sym==='RDDT')?.price || '-'}</div>
                        <div class="sub">目标 $230</div>
                    </div>
                </div>`;

                // Group by category
                const groups = [
                    { key: '持仓', label: '📍 当前持仓', filter: s => s.group === '持仓' },
                    { key: 'B-2026计划', label: '📋 分组B · 2026 计划', filter: s => s.group === 'B-2026计划' },
                    { key: 'A-技术分析', label: '📊 分组A · 技术分析', filter: s => s.group === 'A-技术分析' },
                ];

                groups.forEach(g => {
                    const items = stocks.filter(g.filter).sort((a, b) => (b.tier || 9) - (a.tier || 9));
                    if (items.length === 0) return;
                    html += `<div class="stock-group-title">${g.label}</div>`;
                    html += `<table class="stock-table"><thead><tr>
                        <th>标的</th><th>现价</th><th>日涨跌</th><th>市值</th><th>FwdPE</th>
                        <th>Rev增长</th><th>52周高</th><th>距高点</th><th>评级</th>
                        ${g.key === '持仓' ? '<th>盈亏</th>' : ''}
                        <th>备注</th>
                    </tr></thead><tbody>`;

                    items.forEach(s => {
                        const change = s.change || 0;
                        const chgClass = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
                        const chgSign = change > 0 ? '+' : '';
                        const tierClass = s.tier ? `tier-${s.tier}` : '';
                        const tierLabel = s.tier ? `T${s.tier}` : '';
                        const recClass = s.rec === 'buy' ? 'rec-buy' : s.rec === 'sell' ? 'rec-sell' : 'rec-hold';
                        const recLabel = {buy:'买入',hold:'持有',sell:'卖出'}[s.rec] || (s.rec || '-');
                        const fromHigh = s.from_high || 0;
                        const fhClass = fromHigh >= -10 ? 'up' : fromHigh <= -30 ? 'down' : 'flat';
                        const rowClass = s.group === '持仓' ? 'holding-row' : '';

                        html += `<tr class="${rowClass}">
                            <td class="sym">${s.sym} ${tierLabel ? `<span class="tier-badge ${tierClass}">${tierLabel}</span>` : ''}</td>
                            <td class="price">${s.price != null ? '$' + s.price.toFixed(2) : '-'}</td>
                            <td class="${chgClass}">${chgSign}${change.toFixed(2)}%</td>
                            <td>${s.mkt_cap != null ? '$' + s.mkt_cap + 'B' : '-'}</td>
                            <td>${s.fwd_pe != null ? s.fwd_pe : '-'}</td>
                            <td>${s.rev_growth != null ? s.rev_growth + '%' : '-'}</td>
                            <td>${s.high52 != null ? '$' + s.high52 : '-'}</td>
                            <td class="${fhClass}">${fromHigh.toFixed(1)}%</td>
                            <td><span class="rec-badge ${recClass}">${recLabel}</span></td>
                            ${g.key === '持仓' ? `<td class="pnl-tag ${s.pnl >= 0 ? 'up' : 'down'}">${s.pnl >= 0 ? '+' : ''}$${(s.pnl||0).toFixed(0)} (${(s.pnl_pct||0) >= 0 ? '+' : ''}${(s.pnl_pct||0).toFixed(1)}%)</td>` : ''}
                            <td class="stock-notes" title="${s.notes || ''}">${s.notes || ''}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                });

                html += `<div style="margin-top:16px;font-size:11px;color:var(--text2);">
                    数据来源: Yahoo Finance · 更新时间: ${data.lastUpdate || '未知'} · 
                    T1=核心推荐 T2=次选 T3=观察 · 
                    <a href="https://finance.yahoo.com" target="_blank" style="color:var(--accent);">Yahoo Finance ↗</a>
                </div>`;
                container.innerHTML = html;
            } catch(e) {
                console.error('renderStock error:', e);
                renderItems('stock-content', allData.stock || [], 'stock-count');
            }
        }
        
        function renderTodo() {
            const todo = allData.todo || { active: [], backlog: [] };
            const active = todo.active || [];
            const backlog = todo.backlog || [];
            const total = active.length + backlog.length;
            document.getElementById('todo-count').textContent = active.length + ' 进行 / ' + backlog.length + ' 待定';
            
            let html = '';
            if (active.length > 0) {
                html += '<h3 style="color:var(--green);margin-bottom:12px;">🔴 进行中 (' + active.length + ')</h3>';
                active.forEach(item => {
                    html += '<div class="card" style="border-left:3px solid var(--orange);"><div class="card-header"><div class="card-title">' + item.title + '</div><div class="card-date">' + (item.date || '') + '</div></div><div class="card-body">' + item.desc + '</div></div>';
                });
            }
            if (backlog.length > 0) {
                html += '<h3 style="color:var(--text2);margin:24px 0 12px;">📋 待定 (' + backlog.length + ')</h3>';
                backlog.forEach(item => {
                    html += '<div class="card" style="border-left:3px solid var(--border);"><div class="card-header"><div class="card-title" style="color:var(--text2);">' + item.title + '</div><div class="card-date">' + (item.date || '') + '</div></div><div class="card-body">' + item.desc + '</div></div>';
                });
            }
            if (!html) html = '<div class="card"><div class="card-body">暂无 TODO</div></div>';
            document.getElementById('todo-content').innerHTML = html;
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.section).classList.add('active');
            });
        });
        
        loadData();
    </script>
</body>
</html>
